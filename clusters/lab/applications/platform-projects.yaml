apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-projects
  namespace: platform-argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/perlinmaxim94-gif/platform-infra.git
    targetRevision: main
    path: platform/projects
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

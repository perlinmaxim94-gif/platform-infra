apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-namespaces
  namespace: platform-argocd
spec:
  project: platform
  source:
    repoURL: <ТВОЙ_REPO_URL>
    targetRevision: main
    path: clusters/lab/namespaces/platform
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
